  const LOGO_W = 240;
  const LOGO_H = Math.round(240 * (590 / 1024));

  const COLORS = [
    [255, 59, 92], [255, 159, 10], [50, 215, 75], [10, 132, 255],
    [191, 90, 242], [0, 199, 190], [255, 214, 10], [255, 107, 53],
    [76, 201, 240], [247, 37, 133],
  ];

  let colorIdx = 0;
  function newColor() {
    let idx;
    do { idx = Math.floor(Math.random() * COLORS.length); } while (idx === colorIdx);
    colorIdx = idx;
    return COLORS[colorIdx];
  }

  let color = COLORS[colorIdx];
  let x = 100, y = 80;
  const SPEED = 2.5;
  let vx = SPEED, vy = SPEED;
  let started = false;

  const off = document.createElement('canvas');
  off.width = LOGO_W;
  off.height = LOGO_H;
  const octx = off.getContext('2d');

  function tintedLogo(r, g, b) {
    octx.clearRect(0, 0, LOGO_W, LOGO_H);
    octx.drawImage(img, 0, 0, LOGO_W, LOGO_H);
    octx.globalCompositeOperation = 'multiply';
    octx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    octx.fillRect(0, 0, LOGO_W, LOGO_H);
    octx.globalCompositeOperation = 'source-over';
  }

  function update() {
    x += vx; y += vy;
    let hitX = false, hitY = false;
    if (x <= 0)           { x = 0;           vx =  Math.abs(vx); hitX = true; }
    if (x + LOGO_W >= W)  { x = W - LOGO_W;  vx = -Math.abs(vx); hitX = true; }
    if (y <= 0)           { y = 0;            vy =  Math.abs(vy); hitY = true; }
    if (y + LOGO_H >= H)  { y = H - LOGO_H;  vy = -Math.abs(vy); hitY = true; }
    if (hitX || hitY) color = newColor();
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    if (started && img.complete) {
      tintedLogo(color[0], color[1], color[2]);
      ctx.drawImage(off, x, y);
    }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  document.addEventListener('click', () => {
    prompt.style.display = 'none';
    started = true;
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen || function(){}).call(el);
  }, { once: true });

  img.onload = loop;
</script>
