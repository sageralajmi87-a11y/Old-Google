<title>Aura Browser</title>
<style>
  :root {
    --bg:#f2f2f7; --surface:#ffffff; --border:rgba(0,0,0,0.10);
    --accent:#007aff; --accent2:#5856d6; --text:#1c1c1e; --text2:#6e6e73; --text3:#aeaeb2;
    --red:#ff3b30; --green:#34c759; --orange:#ff9500;
    --toolbar-h:56px; --topbar-h:52px;
    --radius:14px; --radius-sm:10px;
    --shadow:0 2px 16px rgba(0,0,0,0.10); --shadow-lg:0 8px 32px rgba(0,0,0,0.16);
    --font:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
    --t:0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
  #app{display:flex;flex-direction:column;height:100dvh;width:100%;position:relative;overflow:hidden;}

  /* TOP BAR */
  #topbar{flex-shrink:0;height:var(--topbar-h);background:rgba(255,255,255,0.92);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:6px;z-index:100;}
  #url-form{flex:1;display:flex;align-items:center;background:var(--bg);border-radius:11px;height:36px;padding:0 10px;gap:6px;border:1.5px solid transparent;transition:border-color var(--t),background var(--t),box-shadow var(--t);}
  #url-form.focused{background:#fff;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,122,255,0.15);}
  #url-icon{font-size:13px;flex-shrink:0;transition:color var(--t);}
  #url-input{flex:1;border:none;background:transparent;font-family:var(--font);font-size:15px;color:var(--text);outline:none;min-width:0;}
  #url-input::placeholder{color:var(--text3);}
  #clear-btn{display:none;width:18px;height:18px;border-radius:50%;background:var(--text3);border:none;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;font-size:11px;color:white;transition:background var(--t);}
  #clear-btn:active{background:var(--text2);}
  #clear-btn.visible{display:flex;}
  .topbar-btn{width:36px;height:36px;border-radius:10px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);transition:background var(--t),transform 0.1s;flex-shrink:0;}
  .topbar-btn:active{background:rgba(0,122,255,0.12);transform:scale(0.9);}

  /* TOAST */
  #toast{position:fixed;bottom:calc(var(--toolbar-h) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(28,28,30,0.88);color:white;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;z-index:1000;opacity:0;transition:opacity 0.25s,transform 0.25s;backdrop-filter:blur(10px);pointer-events:none;}

  *{scrollbar-width:none;}*::-webkit-scrollbar{display:none;}
</style>
</head>

<script>
// ══════════════════════════════════════════════
//  PROXY POOL — tried in sequence on block
// ══════════════════════════════════════════════
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

// Sites guaranteed to block iframes — skip proxy attempt, go straight to Safari
const KNOWN_BLOCKED = [
  'google.com','youtube.com','facebook.com','twitter.com','x.com',
  'instagram.com','tiktok.com','netflix.com','reddit.com','linkedin.com',
  'amazon.com','apple.com','microsoft.com','github.com','twitch.tv',
  'discord.com','slack.com','zoom.us','paypal.com','ebay.com',
  'pinterest.com','snapchat.com','whatsapp.com','telegram.org',
  'wikipedia.org','bing.com','yahoo.com','duckduckgo.com','nytimes.com',
  'cnn.com','bbc.com','bbc.co.uk','espn.com','weather.com',
];

function isKnownBlocked(url) {
  try {
    const host = new URL(url).hostname.replace('www.','');
    return KNOWN_BLOCKED.some(d => host === d || host.endsWith('.'+d));
  } catch { return false; }
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let tabs = [], activeTabId = null, tabCounter = 0;
let history_stack = JSON.parse(localStorage.getItem('aura_history') || '[]');
let bookmarks     = JSON.parse(localStorage.getItem('aura_bookmarks') || '[]');

const QUICK_LINKS = [
  {label:'Google',    url:'https://www.google.com',     emoji:'🌐',bg:'#fff'},
  {label:'YouTube',   url:'https://www.youtube.com',    emoji:'▶️',bg:'#fff0f0'},
  {label:'Wikipedia', url:'https://www.wikipedia.org',  emoji:'📖',bg:'#f0f4ff'},
  {label:'Reddit',    url:'https://www.reddit.com',     emoji:'🤖',bg:'#fff3f0'},
  {label:'GitHub',    url:'https://github.com',         emoji:'🐙',bg:'#f5f5f5'},
  {label:'DDG',       url:'https://duckduckgo.com',     emoji:'🦆',bg:'#fff9e6'},
  {label:'Maps',      url:'https://maps.google.com',    emoji:'🗺️',bg:'#e8f5e9'},
  {label:'News',      url:'https://news.google.com',    emoji:'📰',bg:'#e3f2fd'},
];

// ══════════════════════════════════════════════
//  DOM REFS
// ══════════════════════════════════════════════
const $  = id => document.getElementById(id);
const tabbar           = $('tabbar');
const newTabBtn        = $('new-tab-btn');

const urlInput         = $('url-input');
const urlForm          = $('url-form');

const tbShare          = $('tb-share');
const tbTabs           = $('tb-tabs');
const tbBookmarks      = $('tb-bookmarks');
const tabsCount        = $('tabs-count');
const progressBar      = $('progress-bar');
const toastEl          = $('toast');
const fsPrompt         = $('fs-prompt');
const proxyBadge       = $('proxy-badge');

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  buildHomepage();
  createTab();
  bindEvents();
  tryFullscreen();
}

// ══════════════════════════════════════════════
//  HOMEPAGE
// ══════════════════════════════════════════════
function buildHomepage() {
  const hp = document.createElement('div');
  hp.id = 'homepage';
  hp.innerHTML = `
    <div class="hp-inner">
      <div class="hp-greeting">${getGreeting()}</div>
      <div class="hp-sub">Where would you like to go?</div>
      <div class="hp-search">
        <span class="hp-search-icon">🔍</span>
        <input id="hp-search-input" type="text" placeholder="Search the web..." autocomplete="off" autocorrect="off" autocapitalize="none">
      </div>
      <div class="section-label">Quick Access</div>
      <div class="quicklinks" id="quicklinks"></div>
      <div class="section-label" style="margin-top:8px">History</div>
      <div id="hp-history" class="card-list"></div>
      <div class="section-label" style="margin-top:16px">Bookmarks</div>
      <div id="hp-bookmarks" class="card-list"></div>
    </div>`;
  webviewContainer.appendChild(hp);

  QUICK_LINKS.forEach(link => {
    const item = document.createElement('div');
    item.className = 'ql-item';
    item.innerHTML = `<div class="ql-icon" style="background:${link.bg}">${link.emoji}</div><span class="ql-label">${link.label}</span>`;
    item.onclick = () => navigateTo(link.url);
    hp.querySelector('#quicklinks').appendChild(item);
  });

  hp.querySelector('#hp-search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) navigateTo(q); }
  });
}

function getGreeting() {
  const h = new Date().getHours();
  return h < 12 ? '☀️ Good morning' : h < 17 ? '🌤 Good afternoon' : '🌙 Good evening';
}

function refreshHomepageData() {
  const hp = document.getElementById('homepage'); if (!hp) return;
  const hList = hp.querySelector('#hp-history');
  hList.innerHTML = '';
  const recent = [...history_stack].reverse().slice(0,6);
  if (!recent.length) hList.innerHTML = '<div class="empty-state">No history yet</div>';
  else recent.forEach(e => hList.appendChild(makeCardItem('🕐', e.title||e.url, e.url, () => navigateTo(e.url))));

  const bList = hp.querySelector('#hp-bookmarks');
  bList.innerHTML = '';
  if (!bookmarks.length) bList.innerHTML = '<div class="empty-state">No bookmarks yet</div>';
  else bookmarks.slice(0,6).forEach(bm => bList.appendChild(makeCardItem('🔖', bm.title||bm.url, bm.url, () => navigateTo(bm.url))));
}

function makeCardItem(icon, title, url, onClick) {
  const el = document.createElement('div');
  el.className = 'card-list-item';
  el.innerHTML = `<span class="card-list-icon">${icon}</span><div class="card-list-text"><div class="card-list-title">${escapeHtml(title)}</div><div class="card-list-url">${escapeHtml(url)}</div></div>`;
  el.addEventListener('click', onClick);
  return el;
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function createTab(url) {
  const id = ++tabCounter;
  const tab = {id, url:null, title:'New Tab', favicon:'✦', history:[], historyIndex:-1, frameEl:null, usingProxy:false};
  tabs.push(tab);
  const frame = document.createElement('iframe');
  frame.className = 'tab-frame';
  frame.id = `frame-${id}`;
  frame.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-presentation');
  tab.frameEl = frame;
  webviewContainer.appendChild(frame);
  switchTab(id);
  if (url) loadUrl(url);
  updateTabBar(); updateTabsCount();
  return tab;
}

function switchTab(id) {
  activeTabId = id;
  document.querySelectorAll('.tab-frame').forEach(f => f.classList.remove('active'));
  document.getElementById('homepage').classList.remove('active');
  // Remove error pages from OTHER tabs' frames from view (keep DOM)
  tabs.forEach(t => {
    const ep = document.getElementById('error-overlay-'+t.id);
    if (ep) ep.style.display = (t.id === id) ? '' : 'none';
  });
  const tab = getTab(id);
  if (tab.url) {
    tab.frameEl.classList.add('active');
    proxyBadge.classList.toggle('visible', !!tab.usingProxy);
  } else {
    document.getElementById('homepage').classList.add('active');
    proxyBadge.classList.remove('visible');
    refreshHomepageData();
  }
  updateTabBar(); updateUrlBar(); updateNavButtons();
}

function closeTab(id, e) {
  if (e) e.stopPropagation();
  const err = document.getElementById('error-overlay-'+id);
  if (err) err.remove();
  if (tabs.length === 1) {
    const tab = getTab(id);
    tab.url=null; tab.title='New Tab'; tab.favicon='✦'; tab.history=[]; tab.historyIndex=-1; tab.usingProxy=false;
    tab.frameEl.src='about:blank'; switchTab(id); updateTabBar(); return;
  }
  const idx = tabs.findIndex(t => t.id===id);
  getTab(id).frameEl.remove();
  tabs.splice(idx,1);
  if (activeTabId === id) switchTab(tabs[Math.min(idx, tabs.length-1)].id);
  updateTabBar(); updateTabsCount();
}

function getTab(id) { return tabs.find(t => t.id===id); }
function getActiveTab() { return getTab(activeTabId); }

function updateTabBar() {
  document.querySelectorAll('.tab-item').forEach(el => el.remove());
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab-item'+(tab.id===activeTabId?' active':'');
    el.innerHTML = `<span class="tab-favicon">${tab.favicon}</span><span class="tab-title">${escapeHtml(tab.title)}</span><button class="tab-close">✕</button>`;
    el.addEventListener('click', () => { switchTab(tab.id); closeOverlay('tabs-overlay'); });
    el.querySelector('.tab-close').addEventListener('click', e => closeTab(tab.id, e));
    tabbar.insertBefore(el, newTabBtn);
  });
  const active = tabbar.querySelector('.tab-item.active');
  if (active) active.scrollIntoView({inline:'nearest',behavior:'smooth'});
}

function updateTabsCount() {
  const n = tabs.length; tabsCount.textContent = n>9?'⊞':n;
  $('tabs-overlay-count').textContent = `${n} Tab${n!==1?'s':''}`;
}

// ══════════════════════════════════════════════
//  3-TIER LOADING STRATEGY
//  Tier 1: Direct iframe
//  Tier 2: CORS proxy (if not known-blocked)
//  Tier 3: Auto-open in Safari + polished error page
// ══════════════════════════════════════════════
function navigateTo(input) {
  input = input.trim(); if (!input) return;
  const url = isUrl(input) ? autoFormatUrl(input) : `https://www.google.com/search?q=${encodeURIComponent(input)}`;
  loadUrl(url);
}

function isUrl(s) {
  if (s.startsWith('http://')||s.startsWith('https://')) return true;
  if (s.startsWith('localhost')||s.startsWith('127.')) return true;
  return /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/.*)?$/.test(s);
}
function autoFormatUrl(u) {
  return (u.startsWith('http://')||u.startsWith('https://')) ? u : 'https://'+u;
}

function loadUrl(url) {
  const tab = getActiveTab(); if (!tab) return;

  // Clean up previous error overlay
  const oldErr = document.getElementById('error-overlay-'+tab.id);
  if (oldErr) oldErr.remove();
  tab.frameEl.style.display = '';
  tab.usingProxy = false;

  tab.url = url; tab.title = getDomain(url); tab.favicon = '🌐';

  // Push to per-tab history
  if (tab.historyIndex < tab.history.length-1)
    tab.history = tab.history.slice(0, tab.historyIndex+1);
  tab.history.push(url); tab.historyIndex = tab.history.length-1;

  tab.frameEl.classList.add('active');
  document.getElementById('homepage').classList.remove('active');
  proxyBadge.classList.remove('visible');

  addToHistory(url);
  updateUrlBar(url); updateTabBar(); updateNavButtons();

  // Route: known-blocked → skip straight to tier 3
  if (isKnownBlocked(url)) {
    stopProgress();
    autoOpenSafari(url);
    showBlockedPage(tab, url, 'known');
    return;
  }

  // Tier 1: direct
  startProgress();
  attemptDirectLoad(tab, url);
}

function attemptDirectLoad(tab, url) {
  let done = false;
  const LIMIT = 9000;

  function onLoaded() {
    if (done) return; done = true; clearTimeout(timer);
    let blocked = false;
    try {
      const doc = tab.frameEl.contentDocument;
      if (!doc || doc.body === null || doc.body.innerHTML.trim() === '') blocked = true;
      else { try { tab.title = doc.title || getDomain(url); } catch(e){} }
    } catch(e) {
      // cross-origin = loaded fine
      tab.title = getDomain(url); blocked = false;
    }
    if (blocked) attemptProxyLoad(tab, url, 0);
    else { stopProgress(); tab.favicon='🌐'; updateTabBar(); updateNavButtons(); }
  }

  function onError() {
    if (done) return; done = true; clearTimeout(timer);
    attemptProxyLoad(tab, url, 0);
  }

  const timer = setTimeout(() => {
    if (done) return; done = true;
    // timeout: check if cross-origin success
    let blocked = false;
    try { const doc = tab.frameEl.contentDocument; if (!doc||!doc.body||doc.body.innerHTML.trim()==='') blocked=true; }
    catch(e) { /* cross-origin, treat as ok */ }
    if (blocked) attemptProxyLoad(tab, url, 0);
    else stopProgress();
  }, LIMIT);

  tab.frameEl.onload  = onLoaded;
  tab.frameEl.onerror = onError;
  try { tab.frameEl.src = url; } catch(e) { onError(); }
}

function attemptProxyLoad(tab, url, idx) {
  if (idx >= PROXIES.length) {
    // All proxies exhausted → tier 3
    stopProgress();
    autoOpenSafari(url);
    showBlockedPage(tab, url, 'proxy-failed');
    return;
  }

  const proxyUrl = PROXIES[idx](url);
  let done = false;

  function onLoaded() {
    if (done) return; done = true; clearTimeout(timer);
    let ok = false;
    try {
      const doc = tab.frameEl.contentDocument;
      if (doc && doc.body && doc.body.innerHTML.trim() !== '') ok = true;
    } catch(e) { ok = true; } // cross-origin = loaded

    if (ok) {
      stopProgress();
      tab.usingProxy = true; tab.favicon = '🔀';
      proxyBadge.classList.add('visible');
      try { tab.title = tab.frameEl.contentDocument.title || getDomain(url); } catch(e) { tab.title = getDomain(url); }
      updateTabBar(); updateNavButtons();
      updateUrlBar();
      showToast('🔀 Loaded via proxy');
    } else {
      attemptProxyLoad(tab, url, idx+1);
    }
  }

  function onError() {
    if (done) return; done = true; clearTimeout(timer);
    attemptProxyLoad(tab, url, idx+1);
  }

  const timer = setTimeout(() => { if(done) return; done=true; attemptProxyLoad(tab, url, idx+1); }, 7000);
  tab.frameEl.onload  = onLoaded;
  tab.frameEl.onerror = onError;
  try { tab.frameEl.src = proxyUrl; } catch(e) { onError(); }
}

function autoOpenSafari(url) {
  try { window.open(url, '_blank'); } catch(e) {}
}

function showBlockedPage(tab, url, reason) {
  const existing = document.getElementById('error-overlay-'+tab.id);
  if (existing) existing.remove();
  tab.frameEl.style.display = 'none';

  const isKnown = reason === 'known';
  const proxyNote = reason === 'proxy-failed'
    ? `<p style="font-size:12px;color:var(--text3);margin-top:10px;line-height:1.4">3 proxy servers were tried and also blocked. This site has strict security policies.</p>`
    : '';

  const err = document.createElement('div');
  err.className = 'error-page';
  err.id = 'error-overlay-'+tab.id;
  err.innerHTML = `
    <div class="err-icon-wrap">🔒</div>
    <div class="err-title">${isKnown ? 'Opened in Safari' : 'Cannot Load Page'}</div>
    <div class="err-msg">
      <strong style="color:var(--text);display:block;margin-bottom:6px">${escapeHtml(getDomain(url))}</strong>
      ${isKnown
        ? 'This site blocks embedding for security reasons, so it was automatically opened in Safari.'
        : 'This site could not be loaded in the browser. It was also opened in Safari for you.'}
      ${proxyNote}
    </div>
    <div class="err-actions">
      <button class="err-btn err-btn-primary" onclick="openExternalCurrent()">🔗 Open in Safari</button>
      ${!isKnown ? `<button class="err-btn err-btn-proxy" onclick="retryProxy()">🔀 Retry with Proxy</button>` : ''}
      <button class="err-btn err-btn-secondary" onclick="searchCurrentUrl()">🔍 Search for this Site</button>
      <button class="err-btn err-btn-secondary" onclick="goHome()">🏠 Homepage</button>
    </div>`;
  webviewContainer.appendChild(err);
}

// Called from error page buttons
function openExternalCurrent() {
  const tab = getActiveTab();
  if (tab && tab.url) window.open(tab.url, '_blank');
}
function retryProxy() {
  const tab = getActiveTab(); if (!tab||!tab.url) return;
  const err = document.getElementById('error-overlay-'+tab.id);
  if (err) err.remove();
  tab.frameEl.style.display = '';
  startProgress();
  attemptProxyLoad(tab, tab.url, 0);
}
function searchCurrentUrl() {
  const tab = getActiveTab(); if (!tab||!tab.url) return;
  navigateTo(getDomain(tab.url));
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function goBack() {
  const tab = getActiveTab(); if (!tab) return;
  const err = document.getElementById('error-overlay-'+tab.id);
  if (err) err.remove(); tab.frameEl.style.display='';
  if (tab.historyIndex > 0) {
    tab.historyIndex--;
    const url = tab.history[tab.historyIndex];
    tab.url=url; tab.frameEl.src=url; updateUrlBar(url); startProgress();
  } else {
    tab.url=null; tab.title='New Tab'; tab.favicon='✦'; tab.usingProxy=false;
    tab.frameEl.src='about:blank'; tab.frameEl.classList.remove('active');
    proxyBadge.classList.remove('visible');
    document.getElementById('homepage').classList.add('active');
    refreshHomepageData(); updateUrlBar('');
  }
  updateNavButtons();
}

function goForward() {
  const tab = getActiveTab(); if (!tab) return;
  if (tab.historyIndex < tab.history.length-1) {
    tab.historyIndex++;
    const url = tab.history[tab.historyIndex];
    tab.url=url; tab.frameEl.src=url; updateUrlBar(url); startProgress();
  }
  updateNavButtons();
}

function reload() {
  const tab = getActiveTab(); if (!tab||!tab.url) return;
  const err = document.getElementById('error-overlay-'+tab.id);
  if (err) err.remove(); tab.frameEl.style.display='';
  startProgress();
  try { tab.frameEl.contentWindow.location.reload(); } catch(e) { tab.frameEl.src = tab.url; }
}

function goHome() {
  const tab = getActiveTab(); if (!tab) return;
  const err = document.getElementById('error-overlay-'+tab.id);
  if (err) err.remove();
  tab.url=null; tab.title='New Tab'; tab.favicon='✦'; tab.usingProxy=false;
  tab.frameEl.src='about:blank'; tab.frameEl.style.display='';
  tab.frameEl.classList.remove('active');
  proxyBadge.classList.remove('visible');
  document.getElementById('homepage').classList.add('active');
  refreshHomepageData(); updateUrlBar(''); updateNavButtons(); updateTabBar();
}

function updateNavButtons() {
  const tab = getActiveTab();
  const canBack = tab && (tab.historyIndex>0 || tab.url!==null);
  const canFwd  = tab && tab.historyIndex < tab.history.length-1;
  btnBack.disabled=!canBack; tbBack.disabled=!canBack; tbForward.disabled=!canFwd;
}

function updateUrlBar(url) {
  const tab = getActiveTab();
  const u = url !== undefined ? url : (tab ? tab.url||'' : '');
  urlInput.value = u;
  if (!u) { urlIcon.textContent='🔍'; }
  else if (tab && tab.usingProxy) { urlIcon.textContent='🔀'; }
  else { urlIcon.textContent='🔒'; }
  clearBtn.classList.toggle('visible', u.length>0);
}

// ══════════════════════════════════════════════
//  PROGRESS BAR
// ══════════════════════════════════════════════
let progressTimer=null, progressVal=0;
function startProgress(){
  progressVal=0; progressBar.style.width='0%'; progressBar.classList.add('loading');
  clearInterval(progressTimer);
  progressTimer=setInterval(()=>{ if(progressVal<80){progressVal+=Math.random()*10; progressBar.style.width=Math.min(progressVal,80)+'%';} },250);
}
function stopProgress(){
  clearInterval(progressTimer); progressBar.style.width='100%';
  setTimeout(()=>{ progressBar.classList.remove('loading'); progressBar.style.width='0%'; },400);
}

// ══════════════════════════════════════════════
//  HISTORY & BOOKMARKS
// ══════════════════════════════════════════════
function addToHistory(url){
  const entry={url,title:getDomain(url),time:Date.now()};
  history_stack=history_stack.filter(h=>h.url!==url); history_stack.push(entry);
  if(history_stack.length>100) history_stack.shift();
  localStorage.setItem('aura_history',JSON.stringify(history_stack));
}
function renderHistorySheet(){
  const c=$('history-list'); c.innerHTML='';
  const recent=[...history_stack].reverse().slice(0,50);
  if(!recent.length){c.innerHTML='<div class="empty-state">No history yet</div>';return;}
  recent.forEach(entry=>{
    const el=makeCardItem('🕐',entry.title||entry.url,entry.url,()=>{navigateTo(entry.url);closeOverlay('history-overlay');});
    const del=document.createElement('button'); del.className='card-list-del'; del.textContent='✕';
    del.onclick=e=>{e.stopPropagation();history_stack=history_stack.filter(h=>h.url!==entry.url);localStorage.setItem('aura_history',JSON.stringify(history_stack));renderHistorySheet();};
    el.appendChild(del); c.appendChild(el);
  });
}
function addBookmark(url,title){
  if(!url) return false;
  if(bookmarks.find(b=>b.url===url)) return false;
  bookmarks.push({url,title:title||getDomain(url)});
  localStorage.setItem('aura_bookmarks',JSON.stringify(bookmarks)); return true;
}
function renderBookmarksSheet(){
  const c=$('bookmarks-list'); c.innerHTML='';
  if(!bookmarks.length){c.innerHTML='<div class="empty-state">No bookmarks yet. Tap Share → Bookmark to save pages.</div>';return;}
  bookmarks.forEach((bm,i)=>{
    const el=makeCardItem('🔖',bm.title||bm.url,bm.url,()=>{navigateTo(bm.url);closeOverlay('bookmarks-overlay');});
    const del=document.createElement('button'); del.className='card-list-del'; del.textContent='✕';
    del.onclick=e=>{e.stopPropagation();bookmarks.splice(i,1);localStorage.setItem('aura_bookmarks',JSON.stringify(bookmarks));renderBookmarksSheet();};
    el.appendChild(del); c.appendChild(el);
  });
}

// ══════════════════════════════════════════════
//  TABS GRID
// ══════════════════════════════════════════════
function renderTabsGrid(){
  const grid=$('tabs-grid'); grid.innerHTML=''; updateTabsCount();
  tabs.forEach(tab=>{
    const item=document.createElement('div');
    item.className='tg-item'+(tab.id===activeTabId?' active-tab':'');
    item.innerHTML=`<div class="tg-preview">${tab.url?'🌐':'✦'}</div><div class="tg-footer"><span class="tg-favicon">${tab.favicon}</span><span class="tg-title">${escapeHtml(tab.title)}</span><button class="tg-close">✕</button></div>`;
    item.addEventListener('click',()=>{ switchTab(tab.id); closeOverlay('tabs-overlay'); });
    item.querySelector('.tg-close').addEventListener('click',e=>{ e.stopPropagation(); closeTab(tab.id); renderTabsGrid(); });
    grid.appendChild(item);
  });
  const n=document.createElement('div'); n.className='tg-new';
  n.innerHTML='<span class="tg-new-icon">＋</span><span>New Tab</span>';
  n.onclick=()=>{ createTab(); closeOverlay('tabs-overlay'); };
  grid.appendChild(n);
}

// ══════════════════════════════════════════════
//  OVERLAYS
// ══════════════════════════════════════════════
function openOverlay(id){ $(id).classList.add('open'); }
function closeOverlay(id){ $(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(ov=>{ ov.addEventListener('click',e=>{ if(e.target===ov) closeOverlay(ov.id); }); });

// ══════════════════════════════════════════════
//  SHARE
// ══════════════════════════════════════════════
function openShare(){
  const tab=getActiveTab(), url=tab?tab.url||window.location.href:window.location.href;
  $('share-url-display').textContent=url; openOverlay('share-overlay');
}
function shareAction(action){
  const tab=getActiveTab(), url=tab?tab.url:null; closeOverlay('share-overlay');
  if(action==='copy'){
    if(url){ if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>showToast('Link copied!')).catch(()=>showToast('Copied!')); else showToast('Copy: '+url); }
  } else if(action==='bookmark'){
    if(url){ const ok=addBookmark(url,tab.title); showToast(ok?'🔖 Bookmarked!':'Already bookmarked'); } else showToast('Nothing to bookmark');
  } else if(action==='home'){ showFsPrompt();
  } else if(action==='open'){ if(url) window.open(url,'_blank'); }
}

// ══════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════
function bindEvents(){
  urlForm.addEventListener('submit',e=>{ e.preventDefault(); navigateTo(urlInput.value); urlInput.blur(); });
  urlInput.addEventListener('focus',()=>{ urlForm.classList.add('focused'); urlInput.select(); });
  urlInput.addEventListener('blur',()=>{ urlForm.classList.remove('focused'); });
  urlInput.addEventListener('input',()=>{ clearBtn.classList.toggle('visible',urlInput.value.length>0); });
  clearBtn.addEventListener('click',()=>{ urlInput.value=''; clearBtn.classList.remove('visible'); urlInput.focus(); });
  btnBack.addEventListener('click',goBack);
  btnReload.addEventListener('click',reload);
  newTabBtn.addEventListener('click',()=>createTab());
  tbBack.addEventListener('click',goBack);
  tbForward.addEventListener('click',goForward);
  tbShare.addEventListener('click',openShare);
  tbTabs.addEventListener('click',()=>{ renderTabsGrid(); openOverlay('tabs-overlay'); });
  tbBookmarks.addEventListener('click',()=>{ renderBookmarksSheet(); renderHistorySheet(); openOverlay('bookmarks-overlay'); });
  $('fs-close-prompt').addEventListener('click',()=>fsPrompt.classList.remove('show'));
  document.addEventListener('keydown',e=>{
    if(e.metaKey||e.ctrlKey){
      if(e.key==='l'){e.preventDefault();urlInput.focus();}
      if(e.key==='t'){e.preventDefault();createTab();}
      if(e.key==='w'){e.preventDefault();closeTab(activeTabId);}
      if(e.key==='r'){e.preventDefault();reload();}
    }
  });
}

// ══════════════════════════════════════════════
//  FULLSCREEN
// ══════════════════════════════════════════════
function tryFullscreen(){
  const el=document.documentElement;
  const rfs=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;
  if(rfs) rfs.call(el).catch(()=>setTimeout(showFsPrompt,2000)); else setTimeout(showFsPrompt,2000);
}
function showFsPrompt(){ fsPrompt.classList.add('show'); setTimeout(()=>fsPrompt.classList.remove('show'),6000); }

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg){ clearTimeout(toastTimer); toastEl.textContent=msg; toastEl.classList.add('show'); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2400); }

// ══════════════════════════════════════════════
